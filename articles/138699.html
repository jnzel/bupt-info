<h1>关于暑假期间开放自习教室的通知</h1>
<div class="meta">Wed, 15 Jul 2026 00:00:00 GMT+08:00</div>
<div class="content"><p class="vsbcontent_start"><span style="font-size: 21px;"><strong>各学院、相关单位及广大师生：</strong></span></p>
<p class="vsbcontent_start"><span style="font-size: 21px;"><strong><br></strong></span></p>
<p><span style="font-size: 21px;">自7月18日起，暑假期间西土城路校区开放教三楼1到5层教室，沙河校区开放智慧教学楼1到2层教室供同学们自习使用，后期根据自习学生数量酌情调整。当有比赛、活动等事项需占用部分教室时，请同学们选择空闲教室进行自习，谢谢配合。</span></p>
<p><span style="font-size: 21px;">请大家自觉爱护教室教学设备设施，保持教室内整洁卫生，祝大家假期愉快！</span></p>
<p><span style="font-size: 21px;"><br></span></p>
<p><span style="font-size: 21px;"><br></span></p>
<p style="text-align: right;"><span style="font-size: 21px;">教务部 培养协同处</span></p>
<p class="vsbcontent_end"><span style="font-size: 21px;">2026年7月15日</span></p></div>
