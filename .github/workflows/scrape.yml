name: BUPT RSS Scraper

on:
  schedule:
    # Run every 12 hours (at 00:00 and 12:00 UTC / 08:00 and 20:00 Beijing Time)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

permissions:
  contents: write # Crucial: gives GitHub Action runner permission to push commits to the repository

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build Project
      run: mvn clean package

    - name: Install Playwright Browsers and Dependencies
      run: |
        # Download Playwright Chromium and install required OS-level packages (libraries)
        mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps chromium"

    - name: Run Scraper
      env:
        BUPT_USERNAME: ${{ secrets.BUPT_USERNAME }}
        BUPT_PASSWORD: ${{ secrets.BUPT_PASSWORD }}
      run: |
        # Run the packaged fat JAR
        java -jar target/bupt-info-1.0-SNAPSHOT.jar

    - name: Commit and Push Updated RSS Feed
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add rss.xml
        
        # Check if rss.xml has changes before committing to avoid unnecessary commits
        if git diff-index --quiet HEAD; then
          echo "No changes in RSS feed. Skipping commit."
        else
          git commit -m "Auto-update BUPT RSS feed"
          git push
        fi
